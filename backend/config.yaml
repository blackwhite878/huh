llm:
  # Chutes AI model id. List available: GET https://llm.chutes.ai/v1/models
  # Old "deepseek-ai/DeepSeek-V3-0324" was retired → 404.
  model: deepseek-ai/DeepSeek-V3.2-TEE
  max_tokens: 2000
  concurrency: 3

# ── scraper subsystem (Mudah.my) ──────────────────────────────────────
# mode: "demo"       → use long-term CSV under backend/data/states/
#       "realtime"   → scrape Mudah.my live; on 3 consecutive failures the
#                      system auto-degrades to demo and exposes
#                      forced_demo=true via GET /api/v1/system_status so the
#                      frontend can show a popup.
#       "pure_fetch" → bulk-refresh: scrape ALL MY_REGIONS × ALL TYPE_QUOTA
#                      with Playwright augmentation DISABLED for speed,
#                      append to long-term CSV (pandas-merged, dedup by
#                      listing_url). Ignores brief.target. No ranking.
scraper:
  mode: "demo"
  retries: 3
  # Hard wall-clock per region (overrides scraper GLOBAL_DEADLINE_SEC).
  # Reaching this aborts in-flight detail fetches for the region and uses
  # whatever has been collected so far. 0 = use scraper default (180s).
  realtime_budget_seconds: 90
